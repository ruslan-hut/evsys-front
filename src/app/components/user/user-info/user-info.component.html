<mat-card>
  <mat-card-content>
    <mat-list>
      @for (detail of userInfo; track detail) {
        <mat-list-item>
          <div class="detail-row">
            <span class="detail-name">{{ detail.field | titlecase }}:</span>
            @if (isArray(detail.value)) {
              <div>
                <span class="detail-value">{{ getArray(detail.value)?.length }}</span>
              </div>
            } @else {
              <span class="detail-value">{{ detail.value }}</span>
            }
          </div>
        </mat-list-item>
      }
    </mat-list>
  </mat-card-content>
  <mat-card-actions>
    <button mat-button (click)="goBack()">
      <mat-icon>arrow_back</mat-icon>
      <span>{{ 'userInfo.back' | translate }}</span>
    </button>
  </mat-card-actions>
</mat-card>
