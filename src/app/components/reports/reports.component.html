<div class="reports-container">
  <mat-tab-group [(selectedIndex)]="activeTabIndex" (selectedIndexChange)="onTabChange($event)">
    <mat-tab [label]="'reports.tabs.stationStatus' | translate">
      <ng-template matTabContent>
        <app-station-status></app-station-status>
      </ng-template>
    </mat-tab>
    <mat-tab [label]="'reports.tabs.uptime' | translate">
      <ng-template matTabContent>
        <app-station-uptime></app-station-uptime>
      </ng-template>
    </mat-tab>
    <mat-tab [label]="'reports.tabs.power' | translate">
      <ng-template matTabContent>
        <app-power-analysis></app-power-analysis>
      </ng-template>
    </mat-tab>
  </mat-tab-group>
</div>
