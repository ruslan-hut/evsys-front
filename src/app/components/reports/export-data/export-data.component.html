@if (inProgress) {
  <div><mat-progress-bar mode="indeterminate"></mat-progress-bar></div>
}

<div class="filter-container">
  <!-- Date Range Picker -->
  <mat-form-field appearance="outline" class="date-range-field">
    <mat-label>{{ 'reports.exportData.dateRangeLabel' | translate }}</mat-label>
    <mat-date-range-input [rangePicker]="picker">
      <input matStartDate [(ngModel)]="startDate" [placeholder]="'dashboard.start' | translate" />
      <input matEndDate [(ngModel)]="endDate" [placeholder]="'dashboard.end' | translate" />
    </mat-date-range-input>
    <mat-hint>{{ 'statistic.dateHint' | translate }}</mat-hint>

    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>

    <button mat-icon-button matSuffix [matMenuTriggerFor]="menu" [attr.aria-label]="'reports.exportData.selectRange' | translate">
      <mat-icon>keyboard_arrow_down</mat-icon>
    </button>

    <mat-menu #menu="matMenu">
      @for (range of predefinedRanges; track range) {
        <button mat-menu-item (click)="setRange(range.range)">
          {{ range.label | translate }}
        </button>
      }
    </mat-menu>

    <mat-date-range-picker #picker></mat-date-range-picker>
  </mat-form-field>

  <!-- Group Selector -->
  <mat-form-field appearance="outline">
    <mat-label>{{ 'reports.exportData.selectGroup' | translate }}</mat-label>
    <mat-select [(value)]="selectedGroup">
      @for (group of groups; track group) {
        <mat-option [value]="group.id">{{ group.name | translate }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <!-- Export Button -->
  <button mat-raised-button color="primary" (click)="exportData()" [disabled]="inProgress">
    <mat-icon>download</mat-icon>
    {{ 'reports.exportData.exportCsv' | translate }}
  </button>
</div>
